# Crowdin configuration for KSU Next translation management
# This file configures automatic translation sync with Crowdin
# Supports the top 30 most spoken languages worldwide

# Project configuration
project_id: "YOUR_PROJECT_ID"  # Replace with your actual Crowdin project ID
api_token_env: "CROWDIN_TOKEN"  # Environment variable containing your API token

# File mappings for Android string resources
files:
  - source: "/manager/app/src/main/res/values/strings.xml"
    translation: "/manager/app/src/main/res/values-%android_code%/strings.xml"
    
  # Additional string files if they exist
  - source: "/manager/app/src/main/res/values/arrays.xml"
    translation: "/manager/app/src/main/res/values-%android_code%/arrays.xml"
    ignore_missing: true
    
  - source: "/manager/app/src/main/res/values/plurals.xml"
    translation: "/manager/app/src/main/res/values-%android_code%/plurals.xml"
    ignore_missing: true

# Language mappings for Android locale codes
# Top 30 most spoken languages worldwide with proper Android locale codes
language_mapping:
  android_code:
    # Top 10 most spoken languages
    zh-CN: "zh-rCN"     # Chinese (Mandarin, Simplified) - 918M speakers
    zh-TW: "zh-rTW"     # Chinese (Traditional) - Taiwan variant
    es: "es"            # Spanish - 460M speakers
    es-MX: "es-rMX"     # Spanish (Mexico)
    es-AR: "es-rAR"     # Spanish (Argentina)
    en: "en"            # English - 379M speakers (already default)
    hi: "hi"            # Hindi - 341M speakers
    ar: "ar"            # Arabic - 422M speakers
    pt: "pt"            # Portuguese - 260M speakers
    pt-BR: "pt-rBR"     # Portuguese (Brazil)
    bn: "bn"            # Bengali - 228M speakers
    ru: "ru"            # Russian - 154M speakers
    ja: "ja"            # Japanese - 128M speakers
    
    # Languages 11-20
